spring.application.name=trading-platform

# --- Database connection ---
# These are LOCAL DEV DEFAULTS. In docker-compose the SPRING_DATASOURCE_*
# environment variables override them (env vars win over this file).
spring.datasource.url=jdbc:postgresql://localhost:5432/trading
spring.datasource.username=trading
spring.datasource.password=localdev

# --- JPA / Hibernate ---
# validate: Hibernate checks that entities match the DB schema, but NEVER
# changes it. Flyway owns the schema; Hibernate only maps to it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway ---
# Runs migrations from classpath:db/migration on startup.
spring.flyway.enabled=true
